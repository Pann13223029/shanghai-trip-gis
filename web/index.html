<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shanghai Trip Map</title>

  <!-- Leaflet CSS — the map library's styles (loaded from CDN) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Our custom styles -->
  <link rel="stylesheet" href="css/style.css" />

  <!-- Chart.js for radar charts in sustainability popups and other visualizations -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- ============================================================
       SHANGHAI TRIP GIS — STARTER TEMPLATE
       ============================================================
       This is a working Leaflet.js map that loads real POI data
       from the project's GeoJSON files.

       MODULE 5a: Read through this file. Try changing:
         - The map center coordinates (line ~105)
         - The base map style (line ~110)
         - What shows in popups (the createPopup function)

       MODULE 5b: Extend this map by:
         - Loading all POI category files
         - Adding layer toggle controls
         - Adding a day filter
         - Making it look portfolio-quality
       ============================================================ -->

  <!-- The map fills the full screen -->
  <div id="map"></div>

  <!-- Day filter buttons (top-right) -->
  <div id="day-filter">
    <button class="day-btn active" data-day="all">All</button>
    <button class="day-btn" data-day="1">D1</button>
    <button class="day-btn" data-day="2">D2</button>
    <button class="day-btn" data-day="3">D3</button>
    <button class="day-btn" data-day="4">D4</button>
    <button class="day-btn" data-day="5">D5</button>
    <button class="day-btn" data-day="6">D6</button>
    <button id="sustainability-btn" class="day-btn sustainability-btn">&#127807; Sustainability</button>
    <button id="heatmap-btn" class="day-btn heatmap-btn">&#128293; Heatmap</button>
  </div>

  <!-- Sustainability legend (hidden by default) -->
  <div id="sustainability-legend" class="hidden">
    <div class="legend-title">Sustainability Score</div>
    <div class="legend-items">
      <div class="legend-item">
        <span class="legend-dot" style="background:#1a5c2a; width:18px; height:18px;"></span>
        <span>10–12 &nbsp;Excellent</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot" style="background:#2e7d45; width:15px; height:15px;"></span>
        <span>7–9 &nbsp;&nbsp;&nbsp;Good</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot" style="background:#52a869; width:12px; height:12px;"></span>
        <span>4–6 &nbsp;&nbsp;&nbsp;Moderate</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot" style="background:#8fc49a; width:10px; height:10px;"></span>
        <span>1–3 &nbsp;&nbsp;&nbsp;Low</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot" style="background:#b0b0b0; width:8px; height:8px;"></span>
        <span>N/A &nbsp;&nbsp;&nbsp;Not rated</span>
      </div>
    </div>
  </div>

  <!-- Info panel (bottom) -->
  <div id="info-panel">
    <div id="info-content">
      Click a marker to see details. Use buttons above to filter by day.
    </div>
  </div>

  <!-- Leaflet JS — the map library (loaded from CDN) -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet.heat plugin for POI density heatmap -->
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

  <script>
    // ============================================================
    // CONFIGURATION
    // ============================================================

    const SHANGHAI_CENTER = [31.2304, 121.4737];
    const DEFAULT_ZOOM = 12;

    const CATEGORY_COLORS = {
      landmark:      '#e74c3c',
      food:          '#e67e22',
      shopping:      '#9b59b6',
      cultural:      '#3498db',
      nature:        '#27ae60',
      transport:     '#7f8c8d',
      accommodation: '#f1c40f'
    };

    const CATEGORY_LABELS = {
      landmark:      'Landmarks',
      food:          'Food',
      shopping:      'Shopping',
      cultural:      'Cultural',
      nature:        'Nature / Parks',
      transport:     'Transport',
      accommodation: 'Accommodation'
    };

    const DATA_FILES = [
      { path: '../data/poi/landmarks.geojson',     category: 'landmark' },
      { path: '../data/poi/food.geojson',           category: 'food' },
      { path: '../data/poi/shopping.geojson',       category: 'shopping' },
      { path: '../data/poi/cultural.geojson',       category: 'cultural' },
      { path: '../data/poi/nature.geojson',         category: 'nature' },
      { path: '../data/poi/transport.geojson',      category: 'transport' },
      { path: '../data/poi/accommodation.geojson',  category: 'accommodation' },
      { path: '../data/poi/suzhou.geojson',         category: 'suzhou' }
    ];


    // ============================================================
    // MAP INITIALIZATION
    // ============================================================

    const map = L.map('map').setView(SHANGHAI_CENTER, DEFAULT_ZOOM);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
      maxZoom: 19
    }).addTo(map);


    // ============================================================
    // MARKER STYLING
    // ============================================================

    function createMarker(feature, latlng) {
      const category = feature.properties.category || 'landmark';
      const color = CATEGORY_COLORS[category] || '#999';

      return L.circleMarker(latlng, {
        radius: 8,
        fillColor: color,
        color: '#fff',
        weight: 2,
        opacity: 1,
        fillOpacity: 0.85
      });
    }


    // ============================================================
    // POPUP CONTENT
    // ============================================================

    function createPopup(feature) {
      const p = feature.properties;
      const coords = feature.geometry.coordinates;

      const amapUrl = `https://uri.amap.com/marker?position=${coords[0]},${coords[1]}&name=${encodeURIComponent(p.name_cn || p.name_en)}`;

      const dayBadge = p.day
        ? `<span class="popup-badge">Day ${p.day}</span>`
        : '<span class="popup-badge popup-badge-gray">Unassigned</span>';

      const catColor = CATEGORY_COLORS[p.category] || '#999';
      const catLabel = CATEGORY_LABELS[p.category] || p.category;
      const catBadge = `<span class="popup-badge" style="background:${catColor}">${catLabel}</span>`;

      return `
        <div class="popup-content">
          <h3 class="popup-title">${p.name_en}</h3>
          <p class="popup-chinese">${p.name_cn || ''}</p>
          <div class="popup-badges">${catBadge} ${dayBadge}</div>
          <p class="popup-desc">${p.description || ''}</p>
          <div class="popup-meta">
            ${p.est_duration_min ? `<span>~${p.est_duration_min} min</span>` : ''}
            ${p.est_cost_cny !== undefined ? `<span>${p.est_cost_cny === 0 ? 'Free' : p.est_cost_cny + ' CNY'}</span>` : ''}
            ${p.opening_hours ? `<span>${p.opening_hours}</span>` : ''}
          </div>
          ${p.notes ? `<p class="popup-notes">${p.notes}</p>` : ''}
          <div class="popup-footer">
            <span class="popup-id">${p.id || ''}</span>
            <a href="${amapUrl}" target="_blank" class="popup-amap">Open in Amap</a>
          </div>
        </div>
      `;
    }


    // ============================================================
    // SUSTAINABILITY MODE HELPERS
    // ============================================================

    function sustainabilityColor(score) {
      if (score === null || score === undefined) return '#b0b0b0';
      if (score >= 10) return '#1a5c2a';
      if (score >= 7)  return '#2e7d45';
      if (score >= 4)  return '#52a869';
      return '#8fc49a';
    }

    function sustainabilityRadius(score) {
      if (score === null || score === undefined) return 5;
      if (score >= 10) return 12;
      if (score >= 7)  return 10;
      if (score >= 4)  return 8;
      return 6;
    }

    // Build popup HTML with a canvas placeholder for the radar chart.
    // Each popup gets a unique canvas id derived from the POI id.
    function createSustainabilityPopup(feature) {
      const p = feature.properties;
      const coords = feature.geometry.coordinates;
      const amapUrl = `https://uri.amap.com/marker?position=${coords[0]},${coords[1]}&name=${encodeURIComponent(p.name_cn || p.name_en)}`;

      const scoreDisplay = (p.sustainability_score !== null && p.sustainability_score !== undefined)
        ? p.sustainability_score + '/12'
        : 'Not rated';

      const scoreColor = sustainabilityColor(p.sustainability_score);

      // Determine whether we have numeric sub-scores for the radar chart
      const hasRadar = [p.transit_access, p.heritage_value, p.walkability, p.environmental_sensitivity]
        .some(v => v !== null && v !== undefined);

      // Unique id for the canvas element
      const canvasId = 'radar-' + (p.id || Math.random().toString(36).slice(2));

      const radarSection = hasRadar
        ? `<div class="radar-container"><canvas id="${canvasId}" width="200" height="200"></canvas></div>`
        : '';

      const communityImpactBadge = p.community_impact
        ? `<div class="community-impact-row">
             <span class="community-label">Community Impact:</span>
             <span class="community-value community-${p.community_impact}">${p.community_impact}</span>
           </div>`
        : '';

      return `
        <div class="popup-content sustainability-popup-content" data-canvas-id="${canvasId}"
             data-transit="${p.transit_access !== undefined ? p.transit_access : ''}"
             data-heritage="${p.heritage_value !== undefined ? p.heritage_value : ''}"
             data-walkability="${p.walkability !== undefined ? p.walkability : ''}"
             data-env="${p.environmental_sensitivity !== undefined ? p.environmental_sensitivity : ''}">
          <h3 class="popup-title">${p.name_en}</h3>
          <p class="popup-chinese">${p.name_cn || ''}</p>
          <div class="sustainability-score-badge" style="background:${scoreColor}">
            &#127807; Sustainability Score: <strong>${scoreDisplay}</strong>
          </div>
          ${radarSection}
          ${communityImpactBadge}
          ${p.sustainability_notes ? `<p class="popup-notes">${p.sustainability_notes}</p>` : ''}
          <div class="popup-footer">
            <span class="popup-id">${p.id || ''}</span>
            <a href="${amapUrl}" target="_blank" class="popup-amap">Open in Amap</a>
          </div>
        </div>
      `;
    }

    // Registry of Chart.js instances keyed by canvas id (to allow destroy on re-open)
    const radarCharts = {};

    // Render the radar chart into the canvas that was just inserted into the DOM
    function renderRadarChart(popupEl) {
      const contentEl = popupEl.querySelector('.sustainability-popup-content');
      if (!contentEl) return;

      const canvasId = contentEl.dataset.canvasId;
      if (!canvasId) return;

      const canvas = document.getElementById(canvasId);
      if (!canvas) return;

      // Parse the data values stored on the element (empty string → null)
      function parseVal(raw) {
        const n = parseFloat(raw);
        return isNaN(n) ? 0 : n;
      }

      const transit  = parseVal(contentEl.dataset.transit);
      const heritage = parseVal(contentEl.dataset.heritage);
      const walk     = parseVal(contentEl.dataset.walkability);
      const env      = parseVal(contentEl.dataset.env);

      // Destroy any previous chart on this canvas id
      if (radarCharts[canvasId]) {
        radarCharts[canvasId].destroy();
        delete radarCharts[canvasId];
      }

      radarCharts[canvasId] = new Chart(canvas, {
        type: 'radar',
        data: {
          labels: ['Transit\nAccess', 'Heritage\nValue', 'Walkability', 'Env.\nSensitivity'],
          datasets: [{
            data: [transit, heritage, walk, env],
            backgroundColor: 'rgba(46, 125, 69, 0.2)',
            borderColor: '#2e7d45',
            borderWidth: 2,
            pointBackgroundColor: '#2e7d45',
            pointRadius: 3
          }]
        },
        options: {
          responsive: false,
          animation: { duration: 400 },
          plugins: {
            legend: { display: false }
          },
          scales: {
            r: {
              min: 0,
              max: 3,
              ticks: {
                stepSize: 1,
                font: { size: 9 },
                color: '#888',
                backdropColor: 'transparent'
              },
              grid: { color: 'rgba(0,0,0,0.1)' },
              angleLines: { color: 'rgba(0,0,0,0.1)' },
              pointLabels: { font: { size: 9 }, color: '#555' }
            }
          }
        }
      });
    }

    // Leaflet popupopen event — fires after the popup DOM is inserted
    map.on('popupopen', function(e) {
      if (sustainabilityMode) {
        renderRadarChart(e.popup.getElement());
      }
    });

    // Apply sustainability styling to all loaded layers
    function applySustainabilityStyles() {
      allLayers.forEach(layer => {
        const score = layer._poiSustainabilityScore;
        layer.setStyle({
          fillColor:   sustainabilityColor(score),
          color:       '#fff',
          weight:      2,
          opacity:     1,
          fillOpacity: score !== null && score !== undefined ? 0.88 : 0.6
        });
        layer.setRadius(sustainabilityRadius(score));

        layer.unbindPopup();
        layer.bindPopup(createSustainabilityPopup(layer._poiFeature), {
          maxWidth: 320,
          className: 'custom-popup'
        });
      });
    }

    // Restore normal (category-color) styling
    function restoreCategoryStyles() {
      allLayers.forEach(layer => {
        const category = layer._poiCategory;
        const color = CATEGORY_COLORS[category] || '#999';
        const day = layer._poiDay;
        const active = (selectedDay === 'all') || (day === parseInt(selectedDay)) || (day === null);

        layer.setStyle({
          fillColor:   color,
          color:       '#fff',
          weight:      2,
          opacity:     active ? 1 : 0.3,
          fillOpacity: active ? 0.85 : 0.15
        });
        layer.setRadius(active ? 8 : 5);

        layer.unbindPopup();
        layer.bindPopup(createPopup(layer._poiFeature), {
          maxWidth: 300,
          className: 'custom-popup'
        });
      });
    }

    // Toggle sustainability mode on / off
    function toggleSustainabilityMode() {
      sustainabilityMode = !sustainabilityMode;

      const btn = document.getElementById('sustainability-btn');
      const legend = document.getElementById('sustainability-legend');
      const layerControl = document.querySelector('.leaflet-control-layers');

      if (sustainabilityMode) {
        btn.classList.add('active', 'sustainability-active');
        legend.classList.remove('hidden');
        if (layerControl) layerControl.style.opacity = '0.4';
        applySustainabilityStyles();
      } else {
        btn.classList.remove('active', 'sustainability-active');
        legend.classList.add('hidden');
        if (layerControl) layerControl.style.opacity = '';
        restoreCategoryStyles();
      }
    }


    // ============================================================
    // DATA LOADING
    // ============================================================

    const allLayers = [];
    const categoryGroups = {};
    let selectedDay = 'all';
    let sustainabilityMode = false;

    // Heatmap state
    let heatmapLayer = null;
    let heatmapVisible = false;

    async function loadGeoJSON(filePath, category) {
      try {
        const response = await fetch(filePath);
        if (!response.ok) throw new Error(`Failed to load ${filePath}`);
        const data = await response.json();

        if (!data.features || data.features.length === 0) return;

        if (!categoryGroups[category]) {
          categoryGroups[category] = L.layerGroup().addTo(map);
        }

        L.geoJSON(data, {
          pointToLayer: createMarker,
          onEachFeature: function (feature, layer) {
            layer.bindPopup(createPopup(feature), {
              maxWidth: 300,
              className: 'custom-popup'
            });

            layer._poiDay = feature.properties.day;
            layer._poiCategory = feature.properties.category || category;
            layer._poiFeature = feature;
            layer._poiSustainabilityScore = feature.properties.sustainability_score !== undefined
              ? feature.properties.sustainability_score
              : null;
            allLayers.push(layer);
          }
        }).addTo(categoryGroups[category]);

      } catch (err) {
        console.warn(`Could not load ${filePath}:`, err.message);
      }
    }

    async function loadAllData() {
      const promises = DATA_FILES.map(f => loadGeoJSON(f.path, f.category));
      await Promise.all(promises);

      // Add layer control
      const overlays = {};
      for (const [cat, group] of Object.entries(categoryGroups)) {
        const label = CATEGORY_LABELS[cat] || cat;
        const color = CATEGORY_COLORS[cat] || '#999';
        overlays[`<span style="color:${color}">&#9679;</span> ${label}`] = group;
      }
      L.control.layers(null, overlays, { collapsed: false, position: 'topleft' }).addTo(map);

      // Build heatmap layer from all POI coordinates (but don't add it yet)
      const heatPoints = allLayers.map(layer => {
        const ll = layer.getLatLng();
        return [ll.lat, ll.lng, 1];
      });
      heatmapLayer = L.heatLayer(heatPoints, {
        radius: 25,
        blur: 15,
        maxZoom: 17,
        gradient: { 0.3: '#ffffb2', 0.5: '#fd8d3c', 0.7: '#f03b20', 1.0: '#bd0026' }
      });

      console.log(`Loaded ${allLayers.length} POIs across ${Object.keys(categoryGroups).length} categories`);
    }

    loadAllData();


    // ============================================================
    // HEATMAP TOGGLE
    // ============================================================

    function toggleHeatmap() {
      heatmapVisible = !heatmapVisible;
      const btn = document.getElementById('heatmap-btn');

      if (heatmapVisible) {
        if (heatmapLayer) heatmapLayer.addTo(map);
        btn.classList.add('active', 'heatmap-active');
      } else {
        if (heatmapLayer) map.removeLayer(heatmapLayer);
        btn.classList.remove('active', 'heatmap-active');
      }
    }

    document.getElementById('heatmap-btn').addEventListener('click', toggleHeatmap);


    // ============================================================
    // DAY FILTER + ANIMATED ROUTE DRAWING
    // ============================================================

    // Currently displayed animated route layer
    let currentRouteLayer = null;
    let animationFrame = null;

    // Animate a route GeoJSON LineString / MultiLineString drawing over ~2 seconds
    function animateRoute(geojsonData) {
      // Cancel any in-progress animation
      if (animationFrame) {
        cancelAnimationFrame(animationFrame);
        animationFrame = null;
      }
      // Remove previous route layer
      if (currentRouteLayer) {
        map.removeLayer(currentRouteLayer);
        currentRouteLayer = null;
      }

      // Collect all coordinate pairs from the GeoJSON features
      const allCoords = [];
      if (geojsonData && geojsonData.features) {
        geojsonData.features.forEach(f => {
          const g = f.geometry;
          if (!g) return;
          if (g.type === 'LineString') {
            allCoords.push(...g.coordinates);
          } else if (g.type === 'MultiLineString') {
            g.coordinates.forEach(line => allCoords.push(...line));
          }
        });
      }

      if (allCoords.length < 2) return;

      // Convert GeoJSON [lng, lat] to Leaflet [lat, lng]
      const latLngs = allCoords.map(c => [c[1], c[0]]);

      // Create an empty polyline that we will progressively fill
      const polyline = L.polyline([], {
        color: '#3498db',
        weight: 4,
        opacity: 0.85,
        lineJoin: 'round'
      }).addTo(map);
      currentRouteLayer = polyline;

      const totalPoints = latLngs.length;
      const durationMs = 2000;
      const startTime = performance.now();

      function step(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / durationMs, 1);
        // Ease-out cubic
        const eased = 1 - Math.pow(1 - progress, 3);
        const pointsToShow = Math.max(2, Math.floor(eased * totalPoints));
        polyline.setLatLngs(latLngs.slice(0, pointsToShow));

        if (progress < 1) {
          animationFrame = requestAnimationFrame(step);
        } else {
          animationFrame = null;
        }
      }

      animationFrame = requestAnimationFrame(step);
    }

    function filterByDay(day) {
      selectedDay = day;

      allLayers.forEach(layer => {
        const layerDay = layer._poiDay;
        const show = (day === 'all') || (layerDay === parseInt(day)) || (layerDay === null);

        if (sustainabilityMode) {
          const score = layer._poiSustainabilityScore;
          layer.setStyle({
            fillOpacity: show ? (score !== null && score !== undefined ? 0.88 : 0.6) : 0.15,
            opacity:     show ? 1 : 0.3
          });
          layer.setRadius(show ? sustainabilityRadius(score) : 5);
        } else {
          if (show) {
            layer.setStyle({ fillOpacity: 0.85, opacity: 1 });
            layer.setRadius(8);
          } else {
            layer.setStyle({ fillOpacity: 0.15, opacity: 0.3 });
            layer.setRadius(5);
          }
        }
      });

      // Handle route animation: only on specific day selection (not 'all')
      if (day === 'all') {
        // Clear any active route
        if (animationFrame) { cancelAnimationFrame(animationFrame); animationFrame = null; }
        if (currentRouteLayer) { map.removeLayer(currentRouteLayer); currentRouteLayer = null; }
        return;
      }

      // Fetch and animate the selected day's route
      fetch(`../data/routes/day-${day}.geojson`)
        .then(res => res.ok ? res.json() : null)
        .then(data => {
          if (data) animateRoute(data);
        })
        .catch(() => {
          // No route file for this day — silently clear any existing route
          if (currentRouteLayer) { map.removeLayer(currentRouteLayer); currentRouteLayer = null; }
        });
    }

    // Wire up day filter buttons
    document.querySelectorAll('.day-btn[data-day]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.day-btn[data-day]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filterByDay(btn.dataset.day);
      });
    });

    // Wire up sustainability toggle button
    document.getElementById('sustainability-btn').addEventListener('click', toggleSustainabilityMode);


    // ============================================================
    // SERVICE WORKER REGISTRATION (for offline support)
    // ============================================================

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log('Service worker registered'))
        .catch(err => console.log('Service worker not registered:', err.message));
    }
  </script>

</body>
</html>
